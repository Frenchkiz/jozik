<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Jozik Capital</title>
  <meta name="description" content="Create your Jozik Capital investor account.">
  <meta property="og:title" content="Jozik Capital">
  <meta property="og:description" content="Create your Jozik Capital investor account.">
  <meta property="og:image" content="https://frenchkiz.github.io/jozik/images/logo.jpg">
  <meta property="og:url" content="https://frenchkiz.github.io/jozik/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body" data-auth-redirect="false">
  <div class="container">
    <header class="site-header site-header-minimal">
      <a href="index.html" class="logo-link">
        <img src="images/logo.jpg" alt="Jozik Capital" class="logo-img" onerror="this.src='images/logo.svg'">
        <span class="logo-text">Jozik <span>Capital</span></span>
      </a>
      <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
        <span class="nav-toggle-box"><span class="nav-toggle-inner"></span></span>
      </button>
      <button type="button" class="nav-overlay" id="nav-overlay" hidden aria-label="Close menu"></button>
      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="login.html">Sign In</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign Up</a>
        <a href="about.html">About Us</a>
        <a href="terms.html">Terms</a>
      </nav>
    </header>
  </div>
  <div class="auth-page">
  <div class="auth-card">
    <h1>Join Jozik Capital</h1>
    <p class="subtitle">Create your investor account</p>

    <form id="signup-form">
      <div class="form-group">
        <label for="full_name">Full name</label>
        <input type="text" id="full_name" name="full_name" required autocomplete="name" placeholder="">
      </div>
      <div class="form-group">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password" placeholder="Min. 8 characters">
          <button type="button" class="password-toggle" data-password-toggle aria-controls="password" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="referral_code">Referral code (optional)</label>
        <input type="text" id="referral_code" name="referral_code" placeholder="JOZXXXXXX" style="text-transform:uppercase">
      </div>
      <label class="form-check">
        <input type="checkbox" id="terms" name="terms" required>
        <span>I agree to the <a href="terms.html" target="_blank">Terms &amp; Conditions</a></span>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </p>
  </div>
  </div>

  <script src="js/footer.js"></script>
  <script src="js/gold-spin.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/password-toggle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
